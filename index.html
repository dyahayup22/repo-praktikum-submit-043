<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Tugas Praktikum - Cloud Computing</title>
    <style>
    :root {
        --primary-pink: #F4C2C2;
        --white: #FFFFFF;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--primary-pink);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        background-color: var(--white);
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(244, 194, 194, 0.4);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    h2 {
        color: var(--primary-pink);
        margin-bottom: 1.5rem;
        font-weight: 700;
    }

    .form-group {
        text-align: left;
        margin-bottom: 1rem;
    }

    label {
        display: block;
        margin-bottom: 5px;
        color: var(--primary-pink);
        font-size: 0.9rem;
        font-weight: 600;
    }

    input[type="text"],
    select,
    input[type="file"] {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--primary-pink);
        border-radius: 10px;
        box-sizing: border-box;
        outline: none;
        background-color: var(--white);
    }

    input[type="text"]:focus,
    select:focus {
        border-color: var(--primary-pink);
        box-shadow: 0 0 5px rgba(244, 194, 194, 0.6);
    }

    button {
        width: 100%;
        background-color: var(--primary-pink);
        color: var(--white);
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 1rem;
    }

    button:hover {
        transform: translateY(-2px);
        opacity: 0.9;
    }

    .footer {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: var(--primary-pink);
    }
</style>
</head>
<body>
    <div class="container">
        <h2>Praktikum Submit</h2>
        <form action="/submit-task" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>NIM Mahasiswa</label>
                <input type="text" name="nim" placeholder="Contoh 0920240052" required>
            </div>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="name" placeholder="Nama Anda" required>
            </div>
            <div class="form-group">
                <label>Kelas</label>
                <input type="text" name="class_name" placeholder="Contoh: TRPL 2A" required>
            </div>
            <div class="form-group">
                <label>Mata Kuliah</label>
                <select name="course">
                    <option value="Cloud Computing">Cloud Computing</option>
                    <option value="Pemrograman Web">Pemrograman Web</option>
                    <option value="Microservices">Machine Learning</option>
                </select>
            </div>
            <div class="form-group">
                <label>Upload File Tugas</label>
                <input type="file" name="file_tugas" required>
            </div>
            <button type="submit">Kirim Tugas</button>
        </form>
        <div class="footer">
            Tugas Praktikum Submit - 043
        </div>
    </div>
</body>
</html>
